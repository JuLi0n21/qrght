name: Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "true"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - run: |
          CGO_ENABLED=0 go build -ldflags="-w -s" -o qrcoder

      - uses: docker/login-action@v3
        with:
          registry: docker.illegalesachen.download
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: docker.illegalesachen.download/qrcoder:${{ github.sha }}${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && ',docker.illegalesachen.download/qrcoder:latest' || '' }}